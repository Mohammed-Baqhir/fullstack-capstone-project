name: GiftLink CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint_js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd giftlink-backend
          npm install

      - name: Run backend lint
        run: |
          cd giftlink-backend
          npm run lint

      - name: Install frontend dependencies
        run: |
          cd giftlink-frontend
          npm install

      - name: Run frontend lint
        run: |
          cd giftlink-frontend
          npm run lint

  client_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd giftlink-frontend
          npm install

      - name: Build frontend
        run: |
          cd giftlink-frontend
          CI=false npm run build
