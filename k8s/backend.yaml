apiVersion: apps/v1
kind: Deployment
metadata:
  name: giftlink-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: giftlink-backend
  template:
    metadata:
      labels:
        app: giftlink-backend
    spec:
      containers:
        - name: giftlink-backend
          image: us.icr.io/YOUR_NAMESPACE/giftlink-backend:1
          ports:
            - containerPort: 3060
          env:
            - name: PORT
              value: "3060"
            - name: MONGO_URL
              value: "mongodb://mongodb-service:27017"
            - name: MONGO_DB
              value: "giftdb"
            - name: JWT_SECRET
              value: "giftlink_secret_key_change_this"
---
apiVersion: v1
kind: Service
metadata:
  name: giftlink-backend-service
spec:
  type: NodePort
  selector:
    app: giftlink-backend
  ports:
    - protocol: TCP
      port: 3060
      targetPort: 3060
